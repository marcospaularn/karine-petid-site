<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karine Pet ID — Painel do Tutor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.topbar{background:#111;border-bottom:1px solid #c9a22730;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-size:20px;font-weight:700;color:#c9a227;font-family:Georgia,serif}
.topbar-name{font-size:13px;color:#c9a22799}
.btn-sair{background:transparent;border:1px solid #c9a22740;color:#c9a22799;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.container{max-width:720px;margin:0 auto;padding:24px 20px}

/* LOGIN */
.login-card{background:#111;border:1px solid #c9a22740;border-radius:20px;max-width:400px;margin:60px auto;overflow:hidden}
.login-header{background:linear-gradient(160deg,#1a1400,#2d2000);padding:28px 24px;text-align:center;border-bottom:1px solid #c9a22760}
.kp{font-size:28px;font-weight:700;color:#c9a227;font-family:Georgia,serif}
.login-title{font-size:16px;color:#f0d060;margin-top:6px}
.login-body{padding:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#c9a22799;margin-bottom:5px;text-transform:uppercase}
.field input{width:100%;background:#1a1400;border:1px solid #c9a22740;border-radius:8px;color:#f0d060;padding:10px 14px;font-size:14px;outline:none}
.field input:focus{border-color:#c9a227}
.btn-login{display:block;width:100%;background:#c9a227;color:#0a0a0a;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
.cadastro-link{text-align:center;margin-top:14px;font-size:13px;color:#c9a22799}
.cadastro-link a{color:#c9a227;text-decoration:none}
.msg{padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-top:12px;display:none}
.msg.error{background:#200a0a;border:1px solid #7a1a1a;color:#f08080}

/* PAINEL */
#painel{display:none}
.section-title{font-size:11px;font-weight:700;color:#c9a22799;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:24px}
.pet-card{background:#111;border:1px solid #c9a22740;border-radius:16px;padding:20px;margin-bottom:16px}
.pet-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.pet-avatar{width:56px;height:56px;border-radius:50%;background:#1a1400;border:2px solid #c9a227;display:flex;align-items:center;justify-content:center;font-size:28px}
.pet-name{font-size:20px;font-weight:700;color:#f0d060}
.pet-breed{font-size:12px;color:#c9a22799;margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ativo{background:#0f2000;border:1px solid #4a8020;color:#7cba30}
.badge-vencido{background:#200a0a;border:1px solid #7a1a1a;color:#f08080}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{background:#1a1400;border-radius:8px;padding:8px 12px;border:0.5px solid #c9a22720}
.info-label{font-size:9px;color:#c9a22799;text-transform:uppercase}
.info-value{font-size:13px;color:#f0d060;font-weight:500;margin-top:2px}
.qr-section{background:#1a1400;border-radius:10px;padding:14px;margin-top:12px;text-align:center;border:0.5px solid #c9a22730}
.qr-code-display{font-size:18px;font-weight:700;color:#c9a227;font-family:monospace;letter-spacing:2px}
.qr-url{font-size:10px;color:#c9a22755;margin-top:4px;word-break:break-all}

.assinatura-card{background:#111;border:1px solid #c9a22740;border-radius:16px;padding:20px}
.venc-info{font-size:13px;color:#c9a22799;margin-top:6px}
.venc-info span{color:#f0d060;font-weight:600}

.scan-list{display:flex;flex-direction:column;gap:8px}
.scan-item{background:#111;border:1px solid #c9a22730;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.scan-date{font-size:12px;color:#f0d060}
.scan-coords{font-size:11px;color:#c9a22799}
.scan-map{font-size:11px;color:#c9a227;text-decoration:none}
.empty{text-align:center;padding:32px;color:#c9a22755;font-size:14px}

.btn-renovar{display:block;background:#c9a227;color:#0a0a0a;text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;margin-top:14px}
.btn-wpp{display:block;background:#25D366;color:#fff;text-align:center;padding:11px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;margin-top:8px}

.btn-novo-pet{display:block;width:100%;background:transparent;border:1px dashed #c9a22760;color:#c9a227;padding:12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:16px}
.novo-pet-form{background:#111;border:1px solid #c9a22740;border-radius:16px;padding:20px;margin-bottom:16px;display:none}
.novo-pet-form .field{margin-bottom:12px}
.novo-pet-form .field label{display:block;font-size:11px;color:#c9a22799;margin-bottom:5px;text-transform:uppercase}
.novo-pet-form .field input,.novo-pet-form .field select,.novo-pet-form .field textarea{width:100%;background:#1a1400;border:1px solid #c9a22740;border-radius:8px;color:#f0d060;padding:9px 12px;font-size:13px;outline:none}
.novo-pet-form .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scan-pet-name{font-size:10px;color:#c9a227;text-transform:uppercase;font-weight:700}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-area">
  <div class="login-card">
    <div class="login-header">
      <div class="kp">KP</div>
      <div class="login-title">Painel do Tutor</div>
    </div>
    <div class="login-body">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="field"><label>Senha</label><input type="password" id="login-senha" placeholder="Sua senha"></div>
      <button class="btn-login" onclick="fazerLogin()">Entrar</button>
      <div class="msg error" id="login-msg"></div>
      <div class="cadastro-link">Não tem conta? <a href="cadastro.html">Cadastre seu pet</a></div>
    </div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">
  <div class="topbar">
    <div class="topbar-logo">KP — Karine Pet ID</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="topbar-name" id="topbar-name"></div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="section-title">Meus pets</div>
    <button class="btn-novo-pet" onclick="alternarFormNovoPet()" id="btn-toggle-novo-pet">+ Cadastrar novo pet</button>

    <div class="novo-pet-form" id="novo-pet-form">
      <div class="field"><label>Nome do pet *</label><input type="text" id="np_nome" placeholder="Ex: Zeus"></div>
      <div class="row">
        <div class="field"><label>Espécie *</label>
          <select id="np_especie">
            <option value="">Selecione</option>
            <option value="Cachorro">Cachorro</option>
            <option value="Gato">Gato</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="field"><label>Raça</label><input type="text" id="np_raca" placeholder="Ex: Dobermann"></div>
      </div>
      <div class="row">
        <div class="field"><label>Cor</label><input type="text" id="np_cor" placeholder="Ex: Marrom"></div>
        <div class="field"><label>Porte</label>
          <select id="np_porte">
            <option value="">Selecione</option>
            <option value="Pequeno">Pequeno</option>
            <option value="Médio">Médio</option>
            <option value="Grande">Grande</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label>Sexo</label>
          <select id="np_sexo">
            <option value="">Selecione</option>
            <option value="Macho">Macho</option>
            <option value="Fêmea">Fêmea</option>
          </select>
        </div>
        <div class="field"><label>Idade</label><input type="text" id="np_idade" placeholder="Ex: 2 anos"></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="np_obs" rows="2" placeholder="Ex: Castrado, usa coleira vermelha..."></textarea></div>
      <div class="field"><label>PIN de acesso veterinário *</label><input type="text" id="np_pin" placeholder="4 dígitos, ex: 1234" maxlength="4" inputmode="numeric"></div>
      <div class="field"><label>Vacinas</label><textarea id="np_vacinas" rows="2"></textarea></div>
      <div class="field"><label>Alergias</label><textarea id="np_alergias" rows="2"></textarea></div>
      <div class="field"><label>Medicamentos em uso</label><textarea id="np_medicamentos" rows="2"></textarea></div>
      <button class="btn-login" onclick="cadastrarNovoPet()" id="btn-salvar-novo-pet">🐾 Salvar pet</button>
      <div class="msg error" id="novo-pet-msg"></div>
    </div>

    <div id="pet-area"><div class="empty">Carregando...</div></div>

    <div class="section-title">Minha assinatura</div>
    <div id="assinatura-area"><div class="empty">Carregando...</div></div>

    <div class="section-title">Histórico de escaneamentos</div>
    <div id="scan-area"><div class="empty">Carregando...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iaoscrszjhbxtlkheqno.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3NjcnN6amhieHRsa2hlcW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODMxMDYsImV4cCI6MjA5NDM1OTEwNn0.87-q7DKdYrzEWmYeZL6E_o_Sg-RMW1I3Zp2Cf2GPXo0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const msg = document.getElementById('login-msg');

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password: senha });
  if (error) {
    msg.textContent = 'Email ou senha incorretos';
    msg.style.display = 'block';
    return;
  }
  mostrarPainel();
}

async function sair() {
  await supabaseClient.auth.signOut();
  document.getElementById('login-area').style.display = 'block';
  document.getElementById('painel').style.display = 'none';
}

let assinaturaAtual = null;

async function mostrarPainel() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) return;

  document.getElementById('login-area').style.display = 'none';
  document.getElementById('painel').style.display = 'block';
  document.getElementById('topbar-name').textContent = user.email;

  // Buscar assinatura
  const { data: ass } = await supabaseClient
    .from('assinaturas')
    .select('*')
    .eq('tutor_email', user.email)
    .single();

  if (!ass) {
    document.getElementById('pet-area').innerHTML = '<div class="empty">Nenhum cadastro encontrado.</div>';
    return;
  }
  assinaturaAtual = ass;

  // Buscar TODOS os pets ativos dessa conta (uma conta pode ter vários, ex: loja
  // de pet cadastrando os pets de vários clientes dela)
  const { data: pets } = await supabaseClient
    .from('pets_saas')
    .select('*')
    .eq('assinatura_id', ass.id)
    .eq('ativo', true)
    .order('created_at', { ascending: true });

  renderPets(pets || []);

  // Renderizar assinatura
  const venc = ass.vencimento ? new Date(ass.vencimento).toLocaleDateString('pt-BR') : '—';
  const diasRestantes = ass.vencimento ? Math.ceil((new Date(ass.vencimento) - new Date()) / (1000*60*60*24)) : 0;
  document.getElementById('assinatura-area').innerHTML = `
    <div class="assinatura-card">
      <span class="badge ${ass.status === 'ativo' ? 'badge-ativo' : 'badge-vencido'}">${ass.status === 'ativo' ? '✅ Ativa' : '⚠️ Vencida'}</span>
      <div class="venc-info">Plano: <span>${ass.plano || 'básico'}</span></div>
      <div class="venc-info">Vencimento: <span>${venc}</span> ${diasRestantes > 0 ? '(em ' + diasRestantes + ' dias)' : ''}</div>
      <a class="btn-renovar" href="https://wa.me/5515997996797?text=Quero renovar minha assinatura Karine Pet ID">Renovar assinatura</a>
      <a class="btn-wpp" href="https://wa.me/5515997996797">📱 Falar com a Karine</a>
    </div>`;

  // Buscar scans de todos os pets da conta
  if (pets && pets.length > 0) {
    const petIds = pets.map(p => p.pet_id);
    const nomesPorId = Object.fromEntries(pets.map(p => [p.pet_id, p.nome]));
    const { data: scans } = await supabaseClient
      .from('scan_historico')
      .select('*')
      .in('pet_id', petIds)
      .order('horario', { ascending: false })
      .limit(15);

    if (scans && scans.length > 0) {
      document.getElementById('scan-area').innerHTML = `<div class="scan-list">${scans.map(s => `
        <div class="scan-item">
          <div>
            <div class="scan-pet-name">${nomesPorId[s.pet_id] || s.pet_id}</div>
            <div class="scan-date">📍 ${new Date(s.horario).toLocaleString('pt-BR')}</div>
            <div class="scan-coords">${s.latitude}, ${s.longitude}</div>
          </div>
          <a class="scan-map" href="https://maps.google.com/?q=${s.latitude},${s.longitude}" target="_blank">Ver no mapa →</a>
        </div>`).join('')}</div>`;
    } else {
      document.getElementById('scan-area').innerHTML = '<div class="empty">🔍 Nenhum escaneamento ainda.</div>';
    }
  } else {
    document.getElementById('scan-area').innerHTML = '<div class="empty">🔍 Nenhum escaneamento ainda.</div>';
  }
}

function renderPets(pets) {
  if (!pets.length) {
    document.getElementById('pet-area').innerHTML = '<div class="empty">Nenhum pet cadastrado ainda. Use o botão acima pra adicionar o primeiro.</div>';
    return;
  }
  document.getElementById('pet-area').innerHTML = pets.map(pet => `
    <div class="pet-card">
      <div class="pet-header">
        <div class="pet-avatar">🐾</div>
        <div>
          <div class="pet-name">${pet.nome}</div>
          <div class="pet-breed">${pet.especie || ''}${pet.raca ? ' • ' + pet.raca : ''}</div>
        </div>
        <span class="badge badge-ativo">✅ Ativo</span>
      </div>
      <div class="info-grid">
        ${pet.cor ? `<div class="info-item"><div class="info-label">Cor</div><div class="info-value">${pet.cor}</div></div>` : ''}
        ${pet.porte ? `<div class="info-item"><div class="info-label">Porte</div><div class="info-value">${pet.porte}</div></div>` : ''}
        ${pet.sexo ? `<div class="info-item"><div class="info-label">Sexo</div><div class="info-value">${pet.sexo}</div></div>` : ''}
        ${pet.idade ? `<div class="info-item"><div class="info-label">Idade</div><div class="info-value">${pet.idade}</div></div>` : ''}
        ${pet.obs ? `<div class="info-item" style="grid-column:1/-1"><div class="info-label">Observações</div><div class="info-value">${pet.obs}</div></div>` : ''}
      </div>
      <div class="qr-section">
        <div class="info-label">Código do pingente (QR Code)</div>
        <div class="qr-code-display">${pet.pet_id}</div>
        <div class="qr-url">https://n8n-n8n.q9hssd.easypanel.host/webhook/karine-petid/scan?id=${pet.pet_id}</div>
      </div>
      <div class="qr-section">
        <div class="info-label">PIN veterinário (informe pra quem for ver a ficha médica completa)</div>
        <div class="qr-code-display">${pet.pin_veterinario || '—'}</div>
      </div>
      ${(pet.vacinas || pet.alergias || pet.medicamentos || pet.historico_medico) ? `
      <div class="qr-section" style="text-align:left">
        <div class="info-label" style="margin-bottom:8px">Ficha médica</div>
        ${pet.vacinas ? `<div class="venc-info">Vacinas: <span>${pet.vacinas}</span></div>` : ''}
        ${pet.alergias ? `<div class="venc-info">Alergias: <span>${pet.alergias}</span></div>` : ''}
        ${pet.medicamentos ? `<div class="venc-info">Medicamentos: <span>${pet.medicamentos}</span></div>` : ''}
        ${pet.historico_medico ? `<div class="venc-info">Histórico: <span>${pet.historico_medico}</span></div>` : ''}
      </div>` : ''}
    </div>`).join('');
}

function alternarFormNovoPet() {
  const form = document.getElementById('novo-pet-form');
  form.style.display = form.style.display === 'block' ? 'none' : 'block';
}

async function cadastrarNovoPet() {
  if (!assinaturaAtual) return;
  const nome = document.getElementById('np_nome').value.trim();
  const especie = document.getElementById('np_especie').value;
  const pin = document.getElementById('np_pin').value.trim();
  const msg = document.getElementById('novo-pet-msg');

  if (!nome || !especie || !pin) {
    msg.textContent = 'Preencha nome, espécie e PIN (obrigatórios)';
    msg.style.display = 'block';
    return;
  }
  if (!/^\d{4}$/.test(pin)) {
    msg.textContent = 'O PIN deve ter exatamente 4 dígitos';
    msg.style.display = 'block';
    return;
  }
  msg.style.display = 'none';

  const btn = document.getElementById('btn-salvar-novo-pet');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const { data: petData, error: petError } = await supabaseClient
      .from('pets_saas')
      .insert({
        pet_id: '',
        nome,
        especie,
        raca: document.getElementById('np_raca').value.trim() || null,
        cor: document.getElementById('np_cor').value.trim() || null,
        porte: document.getElementById('np_porte').value || null,
        sexo: document.getElementById('np_sexo').value || null,
        idade: document.getElementById('np_idade').value.trim() || null,
        obs: document.getElementById('np_obs').value.trim() || null,
        vacinas: document.getElementById('np_vacinas').value.trim() || null,
        alergias: document.getElementById('np_alergias').value.trim() || null,
        medicamentos: document.getElementById('np_medicamentos').value.trim() || null,
        pin_veterinario: pin,
        assinatura_id: assinaturaAtual.id,
        ativo: true
      })
      .select()
      .single();
    if (petError) throw petError;

    const petId = 'PET-' + String(petData.id).padStart(4, '0');
    await supabaseClient.from('pets_saas').update({ pet_id: petId }).eq('id', petData.id);

    // Limpa o formulário e recarrega a lista de pets
    ['np_nome','np_raca','np_cor','np_idade','np_obs','np_pin','np_vacinas','np_alergias','np_medicamentos'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('np_especie').value = '';
    document.getElementById('np_porte').value = '';
    document.getElementById('np_sexo').value = '';
    document.getElementById('novo-pet-form').style.display = 'none';

    await mostrarPainel();
  } catch (err) {
    msg.textContent = 'Erro: ' + (err.message || 'Tente novamente');
    msg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '🐾 Salvar pet';
  }
}

// Verificar sessão ao carregar
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if (session) mostrarPainel();
});
</script>
</body>
</html>
