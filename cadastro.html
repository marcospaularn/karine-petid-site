<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karine Pet ID — Cadastro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111;border:1px solid #c9a22740;border-radius:20px;max-width:480px;width:100%;overflow:hidden}
.header{background:linear-gradient(160deg,#1a1400,#2d2000);padding:28px 24px;text-align:center;border-bottom:1px solid #c9a22760}
.kp{font-size:28px;font-weight:700;color:#c9a227;font-family:Georgia,serif}
.title{font-size:18px;font-weight:600;color:#f0d060;margin-top:6px}
.sub{font-size:12px;color:#c9a22799;margin-top:4px}
.body{padding:28px 24px}
.section-title{font-size:11px;font-weight:700;color:#c9a22799;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:20px}
.section-title:first-child{margin-top:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#c9a22799;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.field input,.field select,.field textarea{width:100%;background:#1a1400;border:1px solid #c9a22740;border-radius:8px;color:#f0d060;padding:10px 14px;font-size:14px;outline:none;transition:border .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#c9a227}
.field textarea{resize:vertical;min-height:70px}
.field select option{background:#1a1400}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:block;width:100%;background:#c9a227;color:#0a0a0a;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .2s}
.btn:hover{transform:scale(1.02)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{padding:12px;border-radius:8px;font-size:13px;text-align:center;margin-top:14px;display:none}
.msg.success{background:#0f2000;border:1px solid #4a8020;color:#7cba30}
.msg.error{background:#200a0a;border:1px solid #7a1a1a;color:#f08080}
.login-link{text-align:center;margin-top:16px;font-size:13px;color:#c9a22799}
.login-link a{color:#c9a227;text-decoration:none}

.tipo-conta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.tipo-conta label{display:flex;flex-direction:column;align-items:center;gap:4px;background:#1a1400;border:1px solid #c9a22740;border-radius:10px;padding:14px 10px;cursor:pointer;font-size:12px;color:#c9a22799;text-align:center;transition:border .2s}
.tipo-conta input{display:none}
.tipo-conta input:checked + span{color:#f0d060;font-weight:700}
.tipo-conta label:has(input:checked){border-color:#c9a227;background:#241d00}
.tipo-conta .icon{font-size:22px}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="kp">KP</div>
    <div class="title">Cadastrar meu pet</div>
    <div class="sub">Crie sua conta e proteja seu animal</div>
  </div>
  <div class="body">
    <div class="tipo-conta">
      <label><input type="radio" name="tipo_conta" value="tutor" checked onchange="atualizarTipoConta()"><span class="icon">🐾</span><span>Sou tutor</span></label>
      <label><input type="radio" name="tipo_conta" value="comerciante" onchange="atualizarTipoConta()"><span class="icon">🏪</span><span>Sou comerciante (loja/pet shop)</span></label>
    </div>

    <div class="section-title">Seus dados</div>
    <div class="field"><label>Nome completo *</label><input type="text" id="tutor_nome" placeholder="Seu nome completo"></div>
    <div class="row">
      <div class="field"><label>Email *</label><input type="email" id="tutor_email" placeholder="seu@email.com"></div>
      <div class="field"><label>Telefone *</label><input type="text" id="tutor_telefone" placeholder="15999999999"></div>
    </div>
    <div class="field"><label>Senha *</label><input type="password" id="senha" placeholder="Mínimo 6 caracteres"></div>

    <div id="bloco-comerciante" style="display:none">
      <div class="section-title">Dados do negócio</div>
      <div class="field"><label>Nome do negócio *</label><input type="text" id="empresa_nome" placeholder="Ex: Focinho Gelado"></div>
      <div class="row">
        <div class="field"><label>Cor da marca</label><input type="color" id="cor_marca" value="#c9a227"></div>
        <div class="field"><label>WhatsApp comercial</label><input type="text" id="whatsapp_comercial" placeholder="15999999999"></div>
      </div>
      <div class="field"><label>Logo (URL da imagem)</label><input type="text" id="logo_url" placeholder="https://..."></div>
    </div>

    <div id="bloco-pet">
      <div class="section-title">Dados do pet</div>
      <div class="field"><label>Nome do pet *</label><input type="text" id="pet_nome" placeholder="Ex: Zeus"></div>
      <div class="row">
        <div class="field"><label>Espécie *</label>
          <select id="pet_especie">
            <option value="">Selecione</option>
            <option value="Cachorro">Cachorro</option>
            <option value="Gato">Gato</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="field"><label>Raça</label><input type="text" id="pet_raca" placeholder="Ex: Dobermann"></div>
      </div>
      <div class="row">
        <div class="field"><label>Cor</label><input type="text" id="pet_cor" placeholder="Ex: Marrom"></div>
        <div class="field"><label>Porte</label>
          <select id="pet_porte">
            <option value="">Selecione</option>
            <option value="Pequeno">Pequeno</option>
            <option value="Médio">Médio</option>
            <option value="Grande">Grande</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label>Sexo</label>
          <select id="pet_sexo">
            <option value="">Selecione</option>
            <option value="Macho">Macho</option>
            <option value="Fêmea">Fêmea</option>
          </select>
        </div>
        <div class="field"><label>Idade</label><input type="text" id="pet_idade" placeholder="Ex: 2 anos"></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="pet_obs" placeholder="Ex: Castrado, usa coleira vermelha..."></textarea></div>

      <div class="section-title">Ficha médica (visível só com o PIN)</div>
      <div class="field"><label>PIN de acesso veterinário <span id="pin-obrigatorio">*</span></label><input type="text" id="pin_veterinario" placeholder="4 dígitos, ex: 1234" maxlength="4" inputmode="numeric"></div>
      <div class="field"><label>Vacinas</label><textarea id="pet_vacinas" placeholder="Ex: V10 em 03/2026, antirrábica em 01/2026"></textarea></div>
      <div class="field"><label>Alergias</label><textarea id="pet_alergias" placeholder="Ex: Alergia a determinado remédio"></textarea></div>
      <div class="field"><label>Medicamentos em uso</label><textarea id="pet_medicamentos" placeholder="Ex: Nenhum"></textarea></div>
    </div>

    <p id="aviso-comerciante" style="display:none;font-size:12px;color:#c9a22799;margin-bottom:14px">Depois de criar sua conta, você adiciona os pets dos seus clientes direto no painel.</p>

    <button class="btn" onclick="cadastrar()" id="btn-cadastrar">🐾 Cadastrar meu pet</button>
    <div class="msg" id="msg"></div>
    <div class="login-link">Já tem conta? <a href="painel.html">Entrar no painel</a></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iaoscrszjhbxtlkheqno.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3NjcnN6amhieHRsa2hlcW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODMxMDYsImV4cCI6MjA5NDM1OTEwNn0.87-q7DKdYrzEWmYeZL6E_o_Sg-RMW1I3Zp2Cf2GPXo0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function tipoContaSelecionado() {
  return document.querySelector('input[name="tipo_conta"]:checked').value;
}

function atualizarTipoConta() {
  const comerciante = tipoContaSelecionado() === 'comerciante';
  document.getElementById('bloco-comerciante').style.display = comerciante ? 'block' : 'none';
  document.getElementById('bloco-pet').style.display = comerciante ? 'none' : 'block';
  document.getElementById('aviso-comerciante').style.display = comerciante ? 'block' : 'none';
  document.getElementById('pin-obrigatorio').style.display = comerciante ? 'none' : 'inline';
  document.getElementById('btn-cadastrar').textContent = comerciante ? '🏪 Criar conta do meu negócio' : '🐾 Cadastrar meu pet';
}

async function cadastrar() {
  const comerciante = tipoContaSelecionado() === 'comerciante';
  const nome = document.getElementById('tutor_nome').value.trim();
  const email = document.getElementById('tutor_email').value.trim();
  const telefone = document.getElementById('tutor_telefone').value.trim();
  const senha = document.getElementById('senha').value;

  if (!nome || !email || !telefone || !senha) {
    showMsg('Preencha todos os campos obrigatórios (*)', 'error'); return;
  }
  if (senha.length < 6) {
    showMsg('A senha deve ter pelo menos 6 caracteres', 'error'); return;
  }

  let empresaNome = '', corMarca = '', whatsappComercial = '', logoUrl = '';
  let pet_nome = '', especie = '', pin = '';

  if (comerciante) {
    empresaNome = document.getElementById('empresa_nome').value.trim();
    corMarca = document.getElementById('cor_marca').value;
    whatsappComercial = document.getElementById('whatsapp_comercial').value.trim();
    logoUrl = document.getElementById('logo_url').value.trim();
    if (!empresaNome) {
      showMsg('Preencha o nome do negócio', 'error'); return;
    }
  } else {
    pet_nome = document.getElementById('pet_nome').value.trim();
    especie = document.getElementById('pet_especie').value;
    pin = document.getElementById('pin_veterinario').value.trim();
    if (!pet_nome || !especie || !pin) {
      showMsg('Preencha todos os campos obrigatórios (*)', 'error'); return;
    }
    if (!/^\d{4}$/.test(pin)) {
      showMsg('O PIN veterinário deve ter exatamente 4 dígitos', 'error'); return;
    }
  }

  const btn = document.getElementById('btn-cadastrar');
  btn.disabled = true;
  btn.textContent = 'Cadastrando...';

  try {
    // 1. Criar conta no Supabase Auth
    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
      email, password: senha,
      options: { data: { tutor_nome: nome } }
    });
    if (authError) throw authError;

    // 2. Criar assinatura
    const { data: assData, error: assError } = await supabaseClient
      .from('assinaturas')
      .insert({
        tutor_nome: nome,
        tutor_email: email,
        tutor_telefone: telefone,
        plano: comerciante ? 'comerciante' : 'tutor',
        status: 'ativo',
        valor: comerciante ? 49.00 : 19.90,
        inicio: new Date().toISOString(),
        vencimento: new Date(Date.now() + 30*24*60*60*1000).toISOString(),
        tipo_conta: comerciante ? 'comerciante' : 'tutor',
        empresa_nome: comerciante ? empresaNome : null,
        cor_marca: comerciante ? corMarca : null,
        whatsapp_comercial: comerciante ? whatsappComercial : null,
        logo_url: comerciante ? (logoUrl || null) : null
      })
      .select()
      .single();
    if (assError) throw assError;

    if (comerciante) {
      showMsg('✅ Conta do negócio criada! Acesse o painel pra começar a cadastrar os pets dos seus clientes.', 'success');
      btn.textContent = '✅ Cadastrado!';
      setTimeout(() => { window.location.href = 'painel.html'; }, 2000);
      return;
    }

    // 3. Cadastrar pet — o pet_id gerado É o código que vai no QR do pingente.
    // Baseado no id da própria linha de pets_saas (não da assinatura), pois uma
    // assinatura pode ter vários pets e o pet_id precisa ser único globalmente.
    const { data: petData, error: petError } = await supabaseClient
      .from('pets_saas')
      .insert({
        pet_id: '',
        nome: pet_nome,
        especie: especie,
        raca: document.getElementById('pet_raca').value.trim() || null,
        cor: document.getElementById('pet_cor').value.trim() || null,
        porte: document.getElementById('pet_porte').value || null,
        sexo: document.getElementById('pet_sexo').value || null,
        idade: document.getElementById('pet_idade').value.trim() || null,
        obs: document.getElementById('pet_obs').value.trim() || null,
        vacinas: document.getElementById('pet_vacinas').value.trim() || null,
        alergias: document.getElementById('pet_alergias').value.trim() || null,
        medicamentos: document.getElementById('pet_medicamentos').value.trim() || null,
        pin_veterinario: pin,
        assinatura_id: assData.id,
        ativo: true
      })
      .select()
      .single();
    if (petError) throw petError;

    const petId = 'PET-' + String(petData.id).padStart(4, '0');
    await supabaseClient.from('pets_saas').update({ pet_id: petId }).eq('id', petData.id);

    showMsg('✅ Cadastro realizado! O código do seu pet é ' + petId + '. Verifique seu email e acesse o painel.', 'success');
    btn.textContent = '✅ Cadastrado!';

    setTimeout(() => { window.location.href = 'painel.html'; }, 2000);

  } catch(err) {
    showMsg('Erro: ' + (err.message || 'Tente novamente'), 'error');
    btn.disabled = false;
    btn.textContent = comerciante ? '🏪 Criar conta do meu negócio' : '🐾 Cadastrar meu pet';
  }
}
</script>
</body>
</html>
